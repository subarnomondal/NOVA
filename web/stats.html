<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - Neural Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f1012;
            --card-bg: rgba(30, 31, 33, 0.7);
            --accent-blue: #4285f4;
            --accent-purple: #9b72cb;
            --text-main: #e3e3e3;
            --text-dim: #9aa0a6;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .header h1 {
            font-size: 1.5em;
            font-weight: 600;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            margin: 10px 0;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--accent-blue);
            /* Fallback */
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        canvas {
            width: 100% !important;
            max-height: 250px;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <a href="/" class="back-btn">← Back to Neural Core</a>
            <h1>System Analytics</h1>
        </div>
        <div class="stat-label" id="user-name">Analyzing...</div>
    </div>

    <div class="grid-container">
        <!-- Overview Cards -->
        <div class="card">
            <div class="stat-label">Total Interactions</div>
            <div class="stat-value" id="total-interactions">0</div>
        </div>
        <div class="card">
            <div class="stat-label">Active Voice Model</div>
            <div class="stat-value"
                style="font-size: 1.2em; -webkit-text-fill-color: var(--text-main); color: var(--text-main);"
                id="voice-model">...</div>
        </div>

        <!-- Charts -->
        <div class="card" style="grid-column: span 2;">
            <div class="stat-label">Emotional Trend (Last 5 Sessions)</div>
            <canvas id="sentimentChart"></canvas>
        </div>

        <div class="card">
            <div class="stat-label">Top Commands</div>
            <canvas id="commandChart"></canvas>
        </div>

        <div class="card">
            <div class="stat-label">Daily Activity</div>
            <div class="stat-value" id="daily-avg">0</div>
            <div class="stat-label" style="text-transform: none; margin-top: 5px;">Avg interactions per day</div>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/stats/dashboard');
                const data = await res.json();

                // Update text stats
                document.getElementById('total-interactions').textContent = data.overview.total_interactions;
                document.getElementById('user-name').textContent = `Subject: ${data.overview.user_name}`;
                document.getElementById('voice-model').textContent = data.overview.voice_model;
                document.getElementById('daily-avg').textContent = data.daily_activity.average;

                // Update Sentiment Chart
                new Chart(document.getElementById('sentimentChart'), {
                    type: 'line',
                    data: {
                        labels: data.sentiment_trend.labels,
                        datasets: [{
                            label: 'Positivity',
                            data: data.sentiment_trend.data,
                            borderColor: '#9b72cb',
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(155, 114, 203, 0.1)'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { display: false, min: 0, max: 1 },
                            x: { grid: { display: false } }
                        }
                    }
                });

                // Update Command Chart
                const commands = data.command_usage;
                new Chart(document.getElementById('commandChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(commands),
                        datasets: [{
                            data: Object.values(commands),
                            backgroundColor: ['#4285f4', '#ea4335', '#fbbc05', '#34a853', '#9b72cb'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'right' } }
                    }
                });

            } catch (e) {
                console.error("Error loading stats:", e);
            }
        }

        loadStats();
    </script>
</body>

</html>
